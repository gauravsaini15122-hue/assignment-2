<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry Services</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

ul{
    list-style:none;
    display:flex;
    gap:20px;
}

a{
    text-decoration:none;
    color:black;
}

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
}

.left{
    width:50%;
}

.left h1{
    font-size:40px;
    margin-bottom:15px;
}

.left p{
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    background:#1da1f2;
    color:white;
    border:none;
    border-radius:10px;
}

.right{
    width:50%;
    text-align:center;
}

.right img{
    width:350px;
}
.username{
    padding: 5px 15px;
     background:#1da1f2;
    color:white;
    border:none;
    border-radius:10px;}
</style>
</head>
<body>

<nav>
    <h2>Logo</h2>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Contact Us</a></li>
    </ul>

    <h3 class="username" >username</h3>
</nav>

<section class="hero">
    <div class="left">
        <h1>Revitalize Your Clothes with Expert Laundry Services!</h1>
        <p>
            Fresh, clean, and professionally cared for clothes
            delivered right to your doorstep.
        </p>
        <button>Book a Service Today</button>
    </div>

    <div class="right">
        <img src="/img/OIP.webp" alt="Laundry Image">
    </div>
</section>

</body>
</html>
